name: 西安天气每日推送

on:
  schedule:
    # 每天 07:00（北京时间）触发
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  weather-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行天气推送脚本
        env:
          TZ: 'Asia/Shanghai'
        run: |
          python weather_push.py
